# fly.toml app configuration file generated for hyperpedia on 2026-07-20T12:40:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hyperpedia'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'hyperpedia_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/app/public'
  url_prefix = '/'
