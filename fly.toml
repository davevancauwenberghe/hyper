app = "hyper"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[statics]]
  guest_path = "/app/public"
  url_prefix = "/"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "hyper_data"
  destination = "/data"
